name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: part_registry
          POSTGRES_USER: registry
          POSTGRES_PASSWORD: registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://registry:registry@localhost:5432/part_registry

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv venv --python 3.12 && uv pip install -r requirements.txt && uv pip install -e .

      - name: Run migrations
        run: |
          psql $DATABASE_URL -f migrations/001_init.sql
          psql $DATABASE_URL -f migrations/002_add_scope_to_call_logs.sql

      - name: Seed test data
        run: .venv/bin/python scripts/seed.py

      - name: Run tests
        run: .venv/bin/pytest tests/ -v
