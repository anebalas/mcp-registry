services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: part_registry
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d part_registry"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: registry
    volumes:
      - ./migrations:/migrations
    command: >
      psql -h postgres -U registry -d part_registry
           -f /migrations/001_init.sql

  seed:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://registry:registry@postgres:5432/part_registry
    command: python scripts/seed.py

  api:
    build: .
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://registry:registry@postgres:5432/part_registry
      API_HOST: 0.0.0.0
      API_PORT: 8001
    ports:
      - "8001:8001"
    command: python api/app.py

  mcp:
    build: .
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://registry:registry@postgres:5432/part_registry
      PART_API_KEY: sk-finance-team-key-001
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "8000:8000"
    command: python mcp_server/app.py
